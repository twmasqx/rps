name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install Buildozer & Cython
        run: |
          python -m pip install --upgrade pip
          pip install Cython==0.29.19 buildozer

      - name: Build APK (Force Clean & Debug)
        env:
          BUILDOZER_WARN_ON_ROOT: '0'
          APP_ANDROID_ACCEPT_SDK_LICENSE: '1'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # تنظيف أي بقايا سابقة لضمان عدم فشل العثور على الملف
          buildozer android clean
          # بدء البناء مع إظهار التفاصيل
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload Build Log (On Failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK (The Real Action)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexusvision-apk
          # تم تعديل المسار ليكون أكثر دقة وموثوقية
          path: bin/*.apk
