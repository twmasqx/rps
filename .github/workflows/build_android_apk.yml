name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install Buildozer & Cython
        run: |
          python -m pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Build APK (Force Run)
        env:
          BUILDOZER_WARN_ON_ROOT: '0'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # إنشاء ملف إعدادات افتراضي إذا كان مفقوداً أو تالفاً
          if [ ! -f buildozer.spec ]; then buildozer init; fi
          # قبول التراخيص وبناء التطبيق
          yes | buildozer -v android debug 2>&1 | tee build.log
        continue-on-error: true # لضمان وصولنا لخطوة رفع الملفات حتى لو حدث خطأ بسيط

      - name: List Directory (Check)
        run: |
          ls -R bin/ || echo "No bin folder yet"
          ls -a

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexusvision-apk
          path: |
            bin/*.apk
            build.log
